name: Build and Notify

on:
  push:
    branches: ["development"]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy - Scan for secrets and vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          scanners: "vuln,secret"
          trivyignores: ".trivyignore"
        env:
          TRIVY_SKIP_DEV_DEPS: "true"

  build:
    name: Build Application
    needs: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/

  notify:
    name: Notify Discord
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_MSG_ESCAPED=$(echo "$COMMIT_MSG" | sed 's/"/\\"/g' | sed "s/'/\\'/g")

          if [ "${{ needs.build.result }}" == "success" ]; then
            COLOR=3066993
            STATUS="✅ SPS Backoffice - Build Exitoso"
            DESCRIPTION="El build del entorno de **desarrollo** finalizó correctamente.\n\n📦 Dependencias instaladas y compilación completada sin errores."
          else
            COLOR=15158332
            STATUS="❌ SPS Backoffice - Build Fallido"
            DESCRIPTION="El build del entorno de **desarrollo** ha fallado.\n\n⚠️ Revisar los logs del workflow para identificar el error."
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"$STATUS\",
                \"description\": \"$DESCRIPTION\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"📝 Cambios\", \"value\": \"$COMMIT_MSG_ESCAPED\", \"inline\": false},
                  {\"name\": \"🌿 Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"🔗 Commit\", \"value\": \"[\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                  {\"name\": \"👤 Autor\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"SPS Salud • Backoffice Frontend • GitHub Actions\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            $DISCORD_WEBHOOK
