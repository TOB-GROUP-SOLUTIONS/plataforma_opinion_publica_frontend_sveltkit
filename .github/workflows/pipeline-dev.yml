name: "🔧 Dev — Build & Test"

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build:
    name: "🔨 Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  notify:
    name: "📢 Notify"
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Opinion Pública — Frontend (dev)"
          description: |
            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.event.head_commit.message }}`
            **Author:** ${{ github.actor }}
          color: ${{ needs.build.result == 'success' && '0x00FF00' || '0xFF0000' }}
          username: "GitHub Actions"
