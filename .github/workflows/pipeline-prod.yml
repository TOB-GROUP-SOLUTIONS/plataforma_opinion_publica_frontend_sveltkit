name: Build, Push and Deploy

on:
  push:
    branches: ["main"]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy - Scan for secrets and vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          scanners: "vuln,secret"
          trivyignores: ".trivyignore"
        env:
          TRIVY_SKIP_DEV_DEPS: "true"

  build:
    name: Build Application
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/

  notify-build:
    name: Notify Build Status
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_MSG_ESCAPED=$(echo "$COMMIT_MSG" | sed 's/"/\\"/g' | sed "s/'/\\'/g")

          if [ "${{ needs.build.result }}" == "success" ]; then
            COLOR=3066993
            STATUS="✅ SPS Backoffice - Build Exitoso"
            DESCRIPTION="**Paso 1/3** - El build de **producción** finalizó correctamente.\n\n📦 Dependencias instaladas y compilación completada sin errores."
          else
            COLOR=15158332
            STATUS="❌ SPS Backoffice - Build Fallido"
            DESCRIPTION="**Paso 1/3** - El build de **producción** ha fallado.\n\n⚠️ El pipeline se detuvo. Revisar los logs para identificar el error."
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"$STATUS\",
                \"description\": \"$DESCRIPTION\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"📝 Cambios\", \"value\": \"$COMMIT_MSG_ESCAPED\", \"inline\": false},
                  {\"name\": \"🌿 Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"🔗 Commit\", \"value\": \"[\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                  {\"name\": \"👤 Autor\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"SPS Salud • Backoffice Frontend • GitHub Actions\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            $DISCORD_WEBHOOK

  publish:
    name: Build & Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image owner lowercase
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/sps_backoffice_frontend_sveltekit:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/sps_backoffice_frontend_sveltekit:${{ github.sha }}

      - name: Trivy - Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.vars.outputs.owner }}/sps_backoffice_frontend_sveltekit:${{ github.sha }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          trivyignores: ".trivyignore"

  notify-publish:
    name: Notify Publish Status
    needs: publish
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_MSG_ESCAPED=$(echo "$COMMIT_MSG" | sed 's/"/\\"/g' | sed "s/'/\\'/g")

          if [ "${{ needs.publish.result }}" == "success" ]; then
            COLOR=3066993
            STATUS="🐳 SPS Backoffice - Imagen Docker Publicada"
            DESCRIPTION="**Paso 2/3** - La imagen Docker se subió correctamente a GitHub Container Registry.\n\n📤 Tags publicados:\n• \`latest\`\n• \`${GITHUB_SHA::7}\`"
          elif [ "${{ needs.publish.result }}" == "skipped" ]; then
            COLOR=9807270
            STATUS="⏭️ SPS Backoffice - Docker Push Omitido"
            DESCRIPTION="**Paso 2/3** - El push de la imagen fue omitido.\n\n⚠️ Un paso anterior falló, revisar notificaciones previas."
          else
            COLOR=15158332
            STATUS="❌ SPS Backoffice - Docker Push Fallido"
            DESCRIPTION="**Paso 2/3** - Error al publicar la imagen Docker.\n\n⚠️ El pipeline se detuvo. Revisar los logs para identificar el error."
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"$STATUS\",
                \"description\": \"$DESCRIPTION\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"📝 Cambios\", \"value\": \"$COMMIT_MSG_ESCAPED\", \"inline\": false},
                  {\"name\": \"🌿 Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"🔗 Commit\", \"value\": \"[\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                  {\"name\": \"👤 Autor\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"SPS Salud • Backoffice Frontend • GitHub Actions\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            $DISCORD_WEBHOOK

  deploy:
    name: Deploy to Prod
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          port: ${{ secrets.STAGING_PORT }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            cd ~/development/together/deploy/frontend
            docker compose pull
            docker compose up -d
            echo "Deploy completed!"

  notify-deploy:
    name: Notify Deploy Status
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_MSG_ESCAPED=$(echo "$COMMIT_MSG" | sed 's/"/\\"/g' | sed "s/'/\\'/g")

          if [ "${{ needs.deploy.result }}" == "success" ]; then
            COLOR=3066993
            STATUS="🚀 SPS Backoffice - Deploy Completado"
            DESCRIPTION="**Paso 3/3** - El deploy a **producción** finalizó exitosamente.\n\n✨ La nueva versión está disponible en el servidor de producción."
          elif [ "${{ needs.deploy.result }}" == "skipped" ]; then
            COLOR=9807270
            STATUS="⏭️ SPS Backoffice - Deploy Omitido"
            DESCRIPTION="**Paso 3/3** - El deploy fue omitido.\n\n⚠️ Un paso anterior falló, revisar notificaciones previas."
          else
            COLOR=15158332
            STATUS="❌ SPS Backoffice - Deploy Fallido"
            DESCRIPTION="**Paso 3/3** - Error durante el deploy a **producción**.\n\n🔥 **Acción requerida**: Verificar conexión SSH y estado del servidor."
          fi

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"embeds\": [{
                \"title\": \"$STATUS\",
                \"description\": \"$DESCRIPTION\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"📝 Cambios\", \"value\": \"$COMMIT_MSG_ESCAPED\", \"inline\": false},
                  {\"name\": \"🌿 Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"🔗 Commit\", \"value\": \"[\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true},
                  {\"name\": \"👤 Autor\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"SPS Salud • Backoffice Frontend • GitHub Actions\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            $DISCORD_WEBHOOK
